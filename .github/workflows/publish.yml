name: Release

# Push a version tag (e.g. v0.1.1) to: build mcp-yahoo-fantasy (in yahoo/), publish it to
# PyPI via Trusted Publishing (OIDC, no stored token), and cut a GitHub Release with the
# built artifacts. Bump the version in yahoo/pyproject.toml to match the tag first -- PyPI
# rejects re-uploading an existing version.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mcp-yahoo-fantasy/
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build the package
        working-directory: yahoo
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: yahoo/dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" yahoo/dist/* --generate-notes
